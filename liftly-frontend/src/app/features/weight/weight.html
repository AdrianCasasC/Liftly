<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-900">Weight Tracking</h1>
  <p class="mt-1 text-sm text-gray-500">Monitor your progress over time</p>
</div>

<div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
  <div class="lg:col-span-2 bg-white shadow rounded-lg border border-gray-200 p-6 flex flex-col items-center justify-center">
    <div *ngIf="logs.length > 0" class="w-full h-80">
      <div echarts [options]="chartOptions" (chartInit)="onChartInit($event)" class="w-full h-full"></div>
    </div>
    
    <div *ngIf="logs.length === 0" class="text-center py-12 text-gray-500">
      <svg class="mx-auto h-12 w-12 text-gray-400 mb-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
      </svg>
      No weight logs found. Add your first entry to see the chart.
    </div>
  </div>

  <div class="bg-white px-4 py-5 shadow sm:rounded-lg sm:p-6 border border-gray-200 h-fit">
    <h3 class="text-lg leading-6 font-medium text-gray-900 mb-4">Log Weight</h3>
    <form [formGroup]="logForm" (ngSubmit)="onSubmit()" class="space-y-4">
      <div>
        <label for="date" class="block text-sm font-medium text-gray-700">Date</label>
        <div class="mt-1">
          <input type="date" id="date" formControlName="date" class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
        </div>
      </div>

      <div>
        <label for="weight" class="block text-sm font-medium text-gray-700">Weight (kg)</label>
        <div class="mt-1 relative rounded-md shadow-sm">
          <input type="number" step="0.1" id="weight" formControlName="weight" class="focus:ring-blue-500 focus:border-blue-500 block w-full pl-3 pr-12 sm:text-sm border-gray-300 py-2 border rounded-md" placeholder="0.0">
          <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
            <span class="text-gray-500 sm:text-sm">kg</span>
          </div>
        </div>
      </div>

      <div class="pt-2">
        <button type="submit" [disabled]="logForm.invalid || isSubmitting" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50">
          {{ isSubmitting ? 'Saving...' : 'Add Log' }}
        </button>
      </div>
    </form>
  </div>
</div>
