<div class="mb-6 flex items-center mb-4">
  <a routerLink="/training" class="text-gray-500 hover:text-gray-700 mr-4">
    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
  </a>
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Create Template</h1>
    <p class="mt-1 text-sm text-gray-500">Design a new workout routine</p>
  </div>
</div>

<form [formGroup]="templateForm" (ngSubmit)="onSubmit()" class="space-y-6 max-w-3xl">
  <div class="bg-white px-4 py-5 shadow sm:rounded-lg sm:p-6 border border-gray-200">
    <div class="grid grid-cols-1 gap-6">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-700">Template Name <span class="text-red-500">*</span></label>
        <input type="text" id="name" formControlName="name" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
      </div>
      <div>
        <label for="description" class="block text-sm font-medium text-gray-700">Description</label>
        <textarea id="description" formControlName="description" rows="3" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"></textarea>
      </div>
    </div>
  </div>

  <div class="bg-white px-4 py-5 shadow sm:rounded-lg sm:p-6 border border-gray-200">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg leading-6 font-medium text-gray-900">Exercises</h3>
      <button type="button" (click)="addExercise()" class="inline-flex items-center px-3 py-1.5 border border-transparent text-xs font-medium rounded text-blue-700 bg-blue-100 hover:bg-blue-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
        <svg class="-ml-1 mr-1.5 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Add Exercise
      </button>
    </div>

    <div formArrayName="exercises" class="space-y-4">
      <div *ngFor="let ex of exercises.controls; let i=index" [formGroupName]="i" class="bg-gray-50 border border-gray-200 rounded-md p-4 relative">
        <div class="absolute top-4 right-4 cursor-pointer text-gray-400 hover:text-red-500" (click)="removeExercise(i)">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
          </svg>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-4 gap-4 mt-2">
          <div class="sm:col-span-4">
            <label class="block text-sm font-medium text-gray-700">Exercise <span class="text-red-500">*</span></label>
            <select formControlName="exerciseId" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md border">
              <option value="" disabled selected>Select an exercise</option>
              <option *ngFor="let listEx of exercisesList" [value]="listEx.id">{{ listEx.name }} ({{ listEx.targetMuscle }})</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Sets</label>
            <input type="number" formControlName="sets" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Reps</label>
            <input type="number" formControlName="reps" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">Rest (s)</label>
            <input type="number" formControlName="restTime" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm py-2 px-3 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          </div>
        </div>
      </div>

      <div *ngIf="exercises.length === 0" class="text-center py-6 text-sm text-gray-500">
        No exercises added yet. Click "Add Exercise" to build your routine.
      </div>
    </div>
  </div>

  <div class="flex justify-end">
    <button type="button" routerLink="/training" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 mr-3">
      Cancel
    </button>
    <button type="submit" [disabled]="templateForm.invalid || isLoading" class="inline-flex justify-center flex-shrink-0 bg-blue-600 py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50">
      {{ isLoading ? 'Saving...' : 'Save Template' }}
    </button>
  </div>
</form>
