<div class="mb-6 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">Training Templates</h1>
    <p class="mt-1 text-sm text-gray-500">Manage your workout routines</p>
  </div>
  <button routerLink="/training/create" class="inline-flex items-center px-4 py-2 border border-transparent outline-none shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
    <svg class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
    </svg>
    Create Template
  </button>
</div>

<div *ngIf="templates$ | async as templates; else loading">
  <div *ngIf="templates.length > 0; else emptyState" class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
    <div *ngFor="let template of templates" class="bg-white overflow-hidden shadow rounded-lg border border-gray-200 hover:shadow-md transition-shadow">
      <div class="p-5">
        <div class="flex items-center">
          <div class="flex-1">
            <h3 class="text-lg font-medium text-gray-900 truncate">{{ template.name }}</h3>
            <p class="mt-1 text-sm text-gray-500 line-clamp-2">{{ template.description }}</p>
          </div>
        </div>
        <div class="mt-4">
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-blue-100 text-blue-800">
            {{ template.exercises?.length || 0 }} exercises
          </span>
        </div>
      </div>
      <div class="bg-gray-50 px-5 py-3 border-t border-gray-200">
        <div class="text-sm">
          <a href="#" class="font-medium text-blue-600 hover:text-blue-500">View details &rarr;</a>
        </div>
      </div>
    </div>
  </div>
</div>

<ng-template #emptyState>
  <div class="text-center bg-white py-12 px-4 shadow rounded-lg border border-gray-200">
    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
      <path fill-rule="evenodd" clip-rule="evenodd" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
    </svg>
    <h3 class="mt-2 text-sm font-medium text-gray-900">No templates</h3>
    <p class="mt-1 text-sm text-gray-500">Get started by creating a new workout routine.</p>
    <div class="mt-6">
      <button routerLink="/training/create" type="button" class="inline-flex items-center px-4 py-2 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700">
        <svg class="-ml-1 mr-2 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        New Template
      </button>
    </div>
  </div>
</ng-template>

<ng-template #loading>
  <div class="flex justify-center py-10">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
  </div>
</ng-template>
