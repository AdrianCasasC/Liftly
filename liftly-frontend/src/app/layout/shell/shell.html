<div class="h-screen flex overflow-hidden bg-gray-100">
  <!-- Sidebar -->
  <div class="hidden md:flex md:flex-shrink-0">
    <div class="flex flex-col w-64 bg-gray-800">
      <div class="h-0 flex-1 flex flex-col pt-5 pb-4 overflow-y-auto">
        <div class="flex items-center flex-shrink-0 px-4">
          <span class="text-white text-3xl font-extrabold tracking-tight">Liftly</span>
        </div>
        <nav class="mt-8 flex-1 px-2 bg-gray-800 space-y-2">
          <a routerLink="/calendar" routerLinkActive="bg-gray-900 border-l-4 border-blue-500 text-white" 
             class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-4 py-3 text-sm font-medium rounded-r-md transition-colors">
            <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            Calendar
          </a>
          <a routerLink="/training" routerLinkActive="bg-gray-900 border-l-4 border-blue-500 text-white" 
             class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-4 py-3 text-sm font-medium rounded-r-md transition-colors">
             <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
            </svg>
            Templates
          </a>
          <a routerLink="/weight" routerLinkActive="bg-gray-900 border-l-4 border-blue-500 text-white" 
             class="text-gray-300 hover:bg-gray-700 hover:text-white group flex items-center px-4 py-3 text-sm font-medium rounded-r-md transition-colors">
             <svg class="mr-3 h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
            Weight Tracking
          </a>
        </nav>
      </div>
      <div class="flex-shrink-0 flex bg-gray-700 p-4 cursor-pointer hover:bg-gray-600 transition-colors" (click)="logout()">
        <svg class="mr-3 h-5 w-5 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        <span class="text-gray-300 text-sm font-medium">Log out</span>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="flex flex-col w-0 flex-1 overflow-hidden">
    <!-- Mobile top bar -->
    <div class="md:hidden flex items-center justify-between bg-gray-800 p-4 text-white">
      <span class="text-xl font-bold">Liftly</span>
      <button (click)="logout()" class="text-sm border border-gray-600 px-3 py-1 rounded">Logout</button>
    </div>
    <div class="md:hidden flex overflow-x-auto bg-gray-700 text-sm">
      <a routerLink="/calendar" routerLinkActive="bg-gray-900 border-b-2 border-blue-500 text-white" class="px-4 py-3 text-gray-300 whitespace-nowrap">Calendar</a>
      <a routerLink="/training" routerLinkActive="bg-gray-900 border-b-2 border-blue-500 text-white" class="px-4 py-3 text-gray-300 whitespace-nowrap">Templates</a>
      <a routerLink="/weight" routerLinkActive="bg-gray-900 border-b-2 border-blue-500 text-white" class="px-4 py-3 text-gray-300 whitespace-nowrap">Weight Track</a>
    </div>

    <!-- Page Content -->
    <main class="flex-1 relative z-0 overflow-y-auto focus:outline-none">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 md:px-8 py-8">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
